<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Guru - Join Channel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #2c1a30 0%, #120b15 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 30px 20px;
            position: relative;
        }

        /* Ambient Glow Behind Profile */
        .profile-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 25px auto;
        }

        .profile-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ff9966;
            border-radius: 50%;
            filter: blur(25px);
            opacity: 0.4;
        }

        .profile-img {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #ff9966;
            object-fit: cover;
            z-index: 1;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 2rem;
            font-style: italic;
            font-weight: bold;
            color: #f3e5f5;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 1rem;
            color: #b3a2b8;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Audio Waveform Animation */
        .waveform {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 30px;
            margin-bottom: 35px;
        }

        .bar {
            width: 4px;
            background: #ff9966;
            border-radius: 2px;
            animation: bounce 1.2s ease-in-out infinite alternate;
        }

        .bar:nth-child(1) { height: 10px; animation-delay: 0.1s; }
        .bar:nth-child(2) { height: 15px; animation-delay: 0.3s; }
        .bar:nth-child(3) { height: 25px; animation-delay: 0.5s; }
        .bar:nth-child(4) { height: 18px; animation-delay: 0.2s; }
        .bar:nth-child(5) { height: 30px; animation-delay: 0.6s; }
        .bar:nth-child(6) { height: 20px; animation-delay: 0.4s; }
        .bar:nth-child(7) { height: 12px; animation-delay: 0.1s; }
        .bar:nth-child(8) { height: 22px; animation-delay: 0.7s; }
        .bar:nth-child(9) { height: 15px; animation-delay: 0.3s; }

        @keyframes bounce {
            0% { transform: scaleY(0.5); }
            100% { transform: scaleY(1.3); }
        }

        /* Gold Gradient Button */
        .btn-telegram {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: linear-gradient(135deg, #e0a96d 0%, #b87d4b 100%);
            color: #120b15;
            padding: 16px 30px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Georgia', serif;
            font-style: italic;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(184, 125, 75, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 30px;
        }

        .btn-telegram:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(184, 125, 75, 0.6);
        }

        .btn-telegram i.fa-whatsapp {
            background: #fff;
            color: #25D366;
            padding: 6px;
            border-radius: 50%;
            font-size: 1.1rem;
        }

        /* Features List */
        .features {
            list-style: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .features li {
            font-size: 0.95rem;
            color: #d1c4e9;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .features i {
            color: #ff9966;
            font-size: 0.9rem;
        }

        /* Footer */
        footer {
            font-size: 0.8rem;
            color: #716075;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }

        footer span {
            font-style: italic;
            color: #b3a2b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-container">
            <div class="profile-glow"></div>
            <img src="photo.jpg" alt="Profile" class="profile-img">
        </div>

        <h1>Prediction Guru</h1>
        <p class="subtitle">best and trusted channel across whatsapp</p>

        <div class="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <a href="https://chat.whatsapp.com/IbCOMMcCrVTJuFR1Gh2qNJ" class="btn-telegram">
            <i class="fa-brands fa-whatsapp"></i> Join the Channel <i class="fa-solid fa-arrow-right" style="background:none; color:inherit; padding:0; font-size:1.1rem;"></i>
        </a>

        <ul class="features">
            <li><i class="fa-solid fa-circle-check"></i> Best Channel on WhatsApp</li>
            <li><i class="fa-solid fa-circle-check"></i> 100% Safe & Secure</li>
            <li><i class="fa-solid fa-circle-check"></i> Trusted by Thousands of Members</li>
        </ul>

        <footer>
            &copy; 2026 <span>Prediction Guru</span>. All rights reserved.
        </footer>
    </div>

</body>
</html>
